# 4G VoLTE 퍼징 환경
# 제거된 것: 5G 컴포넌트, SMS(SMSC), Osmo*, Metrics, Grafana

services:
  # ========================================
  # 데이터베이스
  # ========================================
  mongo:
    image: mongo:6.0
    container_name: mongo
    command: --bind_ip 0.0.0.0
    env_file:
      - .env
    volumes:
      - mongodbdata:/data/db
      - mongodbdata:/data/configdb
    expose:
      - "27017/tcp"
    networks:
      default:
        ipv4_address: ${MONGO_IP}

  mysql:
    build: ./infrastructure/mysql
    image: docker_mysql
    container_name: mysql
    env_file:
      - .env
    volumes:
      - dbdata:/var/lib/mysql
    expose:
      - "3306/tcp"
    networks:
      default:
        ipv4_address: ${MYSQL_IP}

  # ========================================
  # Open5GS 웹 UI (가입자 관리)
  # ========================================
  webui:
    image: docker_open5gs
    container_name: webui
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      - COMPONENT_NAME=webui
    volumes:
      - ./infrastructure/webui:/mnt/webui
    ports:
      - "9999:9999/tcp"
    networks:
      default:
        ipv4_address: ${WEBUI_IP}

  # ========================================
  # 4G 코어 네트워크 (EPC)
  # ========================================
  hss:
    image: docker_open5gs
    container_name: hss
    env_file:
      - .env
    environment:
      - COMPONENT_NAME=hss
    volumes:
      - ./infrastructure/hss:/mnt/hss
      - ./infrastructure/log:/open5gs/install/var/log/open5gs
    depends_on:
      - mongo
    expose:
      - "3868/tcp"
      - "3868/sctp"
    networks:
      default:
        ipv4_address: ${HSS_IP}

  mme:
    image: docker_open5gs
    depends_on:
      - hss
      - sgwc
      - sgwu
      - smf
      - upf
    container_name: mme
    env_file:
      - .env
    environment:
      - COMPONENT_NAME=mme
    volumes:
      - ./infrastructure/mme:/mnt/mme
      - ./infrastructure/log:/open5gs/install/var/log/open5gs
    expose:
      - "3868/tcp"
      - "3868/sctp"
      - "36412/sctp"
    ports:
      - "36412:36412/sctp"
    networks:
      default:
        ipv4_address: ${MME_IP}

  sgwc:
    image: docker_open5gs
    depends_on:
      - smf
      - upf
    container_name: sgwc
    env_file:
      - .env
    environment:
      - COMPONENT_NAME=sgwc
    volumes:
      - ./infrastructure/sgwc:/mnt/sgwc
      - ./infrastructure/log:/open5gs/install/var/log/open5gs
    expose:
      - "2123/udp"
      - "8805/udp"
    networks:
      default:
        ipv4_address: ${SGWC_IP}

  sgwu:
    image: docker_open5gs
    depends_on:
      - smf
      - upf
    container_name: sgwu
    env_file:
      - .env
    environment:
      - COMPONENT_NAME=sgwu
    volumes:
      - ./infrastructure/sgwu:/mnt/sgwu
      - ./infrastructure/log:/open5gs/install/var/log/open5gs
    expose:
      - "8805/udp"
      - "2152/udp"
    ports:
      - "2152:2152/udp"
    networks:
      default:
        ipv4_address: ${SGWU_IP}

  smf:
    image: docker_open5gs
    container_name: smf
    env_file:
      - .env
    environment:
      - COMPONENT_NAME=smf
      - DEPLOY_MODE=4G
    volumes:
      - ./infrastructure/smf:/mnt/smf
      - ./infrastructure/log:/open5gs/install/var/log/open5gs
    expose:
      - "3868/tcp"
      - "3868/sctp"
      - "8805/udp"
      - "2123/udp"
    networks:
      default:
        ipv4_address: ${SMF_IP}

  upf:
    image: docker_open5gs
    depends_on:
      - smf
    container_name: upf
    env_file:
      - .env
    environment:
      - COMPONENT_NAME=upf
    volumes:
      - ./infrastructure/upf:/mnt/upf
      - ./infrastructure/log:/open5gs/install/var/log/open5gs
    expose:
      - "2152/udp"
      - "8805/udp"
    cap_add:
      - NET_ADMIN
    privileged: true
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      default:
        ipv4_address: ${UPF_IP}

  pcrf:
    image: docker_open5gs
    container_name: pcrf
    env_file:
      - .env
    environment:
      - COMPONENT_NAME=pcrf
    depends_on:
      - mongo
    volumes:
      - ./infrastructure/pcrf:/mnt/pcrf
      - ./infrastructure/log:/open5gs/install/var/log/open5gs
    expose:
      - "${PCRF_BIND_PORT}/tcp"
      - "${PCRF_BIND_PORT}/sctp"
    networks:
      default:
        ipv4_address: ${PCRF_IP}

  # ========================================
  # IMS 네트워크 (VoLTE)
  # ========================================
  dns:
    build: ./infrastructure/dns
    image: docker_dns
    container_name: dns
    env_file:
      - .env
    volumes:
      - ./infrastructure/dns:/mnt/dns
    expose:
      - "53/udp"
      - "53/tcp"
    networks:
      default:
        ipv4_address: ${DNS_IP}

  rtpengine:
    build: ./infrastructure/rtpengine
    image: docker_rtpengine
    container_name: rtpengine
    privileged: true
    env_file:
      - .env
    volumes:
      - ./infrastructure/rtpengine:/mnt/rtpengine
    cap_add:
      - NET_ADMIN
    environment:
      - TABLE=0
      - INTERFACE=${RTPENGINE_IP}
      - LISTEN_NG=${RTPENGINE_IP}:2223
      - PORT_MAX=50000
      - PORT_MIN=49000
      - NO_FALLBACK=no
      - TOS=184
    expose:
      - "2223/udp"
    networks:
      default:
        ipv4_address: ${RTPENGINE_IP}

  pyhss:
    build: ./infrastructure/pyhss
    image: docker_pyhss
    container_name: pyhss
    dns: ${DNS_IP}
    volumes:
      - ./infrastructure/pyhss:/mnt/pyhss
      - ./infrastructure/pyhss/logs:/pyhss/log/
    env_file:
      - .env
    depends_on:
      - dns
      - mysql
    expose:
      - "${PYHSS_BIND_PORT}/tcp"
      - "${PYHSS_BIND_PORT}/sctp"
      - "8080/tcp"
    ports:
      - "8080:8080/tcp"
    networks:
      default:
        ipv4_address: ${PYHSS_IP}

  icscf:
    image: docker_kamailio
    container_name: icscf
    dns: ${DNS_IP}
    extra_hosts:
      - "hss.ims.mnc001.mcc001.3gppnetwork.org:${PYHSS_IP}"
      - "scscf.ims.mnc001.mcc001.3gppnetwork.org:${SCSCF_IP}"
    volumes:
      - ./infrastructure/icscf:/mnt/icscf
    env_file:
      - .env
    environment:
      - COMPONENT_NAME=icscf
    depends_on:
      - dns
      - mysql
      - pyhss
    expose:
      - "${ICSCF_BIND_PORT}/tcp"
      - "${ICSCF_BIND_PORT}/sctp"
      - "4060/udp"
      - "4060/tcp"
      - "5060/udp"
      - "5060/tcp"
    networks:
      default:
        ipv4_address: ${ICSCF_IP}

  scscf:
    image: docker_kamailio
    container_name: scscf
    dns: ${DNS_IP}
    extra_hosts:
      - "hss.ims.mnc001.mcc001.3gppnetwork.org:${PYHSS_IP}"
    volumes:
      - ./infrastructure/scscf:/mnt/scscf
    env_file:
      - .env
    environment:
      - COMPONENT_NAME=scscf
    depends_on:
      - dns
      - mysql
      - pyhss
    expose:
      - "${SCSCF_BIND_PORT}/tcp"
      - "${SCSCF_BIND_PORT}/sctp"
      - "6060/udp"
      - "6060/tcp"
      - "5060/udp"
      - "5060/tcp"
    networks:
      default:
        ipv4_address: ${SCSCF_IP}

  smsc:
    build: ./infrastructure/smsc
    image: docker_smsc
    container_name: smsc
    dns: ${DNS_IP}
    env_file:
      - .env
    volumes:
      - ./infrastructure/smsc:/mnt/smsc
      - ./infrastructure/smsc/logs:/var/log/smsc
    depends_on:
      - dns
    expose:
      - "5060/udp"
      - "5060/tcp"
    networks:
      default:
        ipv4_address: ${SMSC_IP}

  # ========================================
  # P-CSCF (퍼징 포인트) ⭐
  # ========================================
  pcscf:
    image: docker_kamailio
    container_name: pcscf
    dns: ${DNS_IP}
    extra_hosts:
      - "ims.mnc001.mcc001.3gppnetwork.org:${ICSCF_IP}"
    volumes:
      - ./infrastructure/pcscf:/mnt/pcscf
      - ./infrastructure/log:/var/log/kamailio
    env_file:
      - .env
    # 네트워크 경로 추가(ip route) 및 IPSec 터널 생성을 위해 필요
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      - COMPONENT_NAME=pcscf
      - DEPLOY_MODE=4G
      - PCSCF_IP=${PCSCF_IP}
    depends_on:
      - dns
      - mysql
      - rtpengine
      - icscf
      - scscf
    expose:
      - "${PCSCF_BIND_PORT}/tcp"
      - "${PCSCF_BIND_PORT}/sctp"
      - "5060/tcp"
      - "5060/udp"
      - "5100/udp"
      - "5100/tcp"
      - "6100/udp"
      - "6100/tcp"
    ports:
      - "5060:5060/tcp"
      - "5060:5060/udp"
      - "5100:5100/udp"
      - "5100:5100/tcp"
      - "6100:6100/udp"
      - "6100:6100/tcp"
    networks:
      default:
        ipv4_address: ${PCSCF_IP}

networks:
  default:
    name: docker_open5gs_default
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-volte
    ipam:
      config:
        - subnet: ${TEST_NETWORK}

volumes:
  mongodbdata:
    name: docker_open5gs_mongodbdata
  dbdata:
    name: docker_open5gs_dbdata
